name: My CI Build

on: 
    push: 
        branches: 
            main

jobs:
    build-job:
        runs-on: ubuntu-latest

        steps:
           - name: step 1 - Start
             run:  echo "Starting build process"  

           - name: step 2 - Checkout code
             uses: actions/checkout@v3

           - name: step 3 - List files
             run:  ls -la 

           - name: step 4 - Simulate build
             run:  echo "Building the application"

           - name: step 5 - Show file content
             run:  cat index.html

           - name: step 6 - Check if index.html exists
             run:  |
               if [ -f index.html ]; then
                 echo "File exists"
               else
                 echo "File not exists"  
                 exit 1
               fi 